<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Adjust administration configurations.">
    <title>Stackly Clinic | Admin Settings</title>
    
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboards.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body style="background-color: var(--bg-primary);">

    <!-- PRELOADER -->
    <div class="preloader">
        <svg class="pulse-svg" viewBox="0 0 150 100">
            <path class="pulse-glow" d="M0,50 L40,50 L50,20 L60,80 L70,45 L75,55 L80,50 L120,50" />
            <path class="pulse-path" d="M0,50 L40,50 L50,20 L60,80 L70,45 L75,55 L80,50 L120,50" />
        </svg>
        <img src="images/logo.webp" alt="Stackly Logo" class="preloader-logo-img">
    </div>

    <!-- Scroll Progress & Cursor -->
    <div class="scroll-progress-container">
        <div class="scroll-progress-bar"></div>
    </div>
    <div class="custom-cursor"></div>
    <div class="custom-cursor-dot"></div>

    <div class="dash-wrapper">
        <!-- SIDEBAR -->
        <aside class="dash-sidebar">
            <div class="dash-sidebar-header">
                <a href="admin-dashboard.html" class="logo">
                    <img src="images/logo.webp" alt="Stackly Logo" style="height: 48px; width: auto; filter: brightness(0) invert(1);">
                </a>
            </div>
            <ul class="dash-menu">
                <li class="dash-menu-item">
                    <a href="admin-dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-users.html"><i class="fa-solid fa-user-injured"></i> Patients List</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-services.html"><i class="fa-solid fa-hospital-user"></i> Clinic Wards</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-projects.html"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
                </li>
                <li class="dash-menu-item">
                    <a href="admin-messages.html"><i class="fa-solid fa-envelope"></i> Messages</a>
                </li>
                <li class="dash-menu-item active">
                    <a href="admin-settings.html"><i class="fa-solid fa-sliders"></i> Settings</a>
                </li>
            </ul>
            <div class="dash-sidebar-footer">
                <li class="dash-menu-item" style="list-style: none;">
                    <a href="login.html" style="color: #ef4444;"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
                </li>
            </div>
        </aside>

        <!-- MAIN LAYOUT -->
        <div class="dash-main">
            <!-- TOPBAR -->
            <header class="dash-topbar">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <button class="dash-menu-trigger" aria-label="Toggle Sidebar"><i class="fa-solid fa-bars"></i></button>
                    <div class="dash-page-title">
                        <h2>Portal Settings</h2>
                    </div>
                </div>
                <div class="dash-topbar-right">
                    <div class="dash-user-profile">
                        <img src="images/doctors/doctor4.webp" alt="Avatar">
                        <div>
                            <span class="dash-user-name">Dr. Elena Rostova</span>
                            <span class="dash-user-role">System Administrator</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- INNER MAIN CONTENT -->
            <main class="dash-content-inner">
                <div class="dash-two-col-grid">
                    <!-- Left: settings form -->
                    <div class="glass-card" style="padding: 30px;">
                        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #fff;">Global Clinic Adjustments</h3>
                        <form id="settings-form" onsubmit="event.preventDefault(); alertCustom('Settings saved successfully!');">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Clinic Name</label>
                                    <input type="text" value="Stackly Medical Clinic" style="padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); color: white;">
                                </div>
                                <div class="form-group">
                                    <label>Support Contact Number</label>
                                    <input type="text" value="+91 7010782745" style="padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); color: white;">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>System Email Address</label>
                                <input type="email" value="admin@stackly.com" style="padding: 10px 14px; background: var(--bg-tertiary); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); color: white; width: 100%;">
                            </div>
                            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Save Configurations</button>
                        </form>
                    </div>

                    <!-- Right: Quick actions -->
                    <div class="glass-card" style="padding: 30px;">
                        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #fff;">Maintenance Actions</h3>
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <button class="btn btn-secondary" onclick="alertCustom('Database cache cleared successfully!');" style="justify-content: center;">Clear Cache</button>
                            <button class="btn btn-secondary" onclick="alertCustom('Database backup initiated...');" style="justify-content: center;">Backup Database</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
