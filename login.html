<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stackly Clinic Portal Access. Login to access patient medical records or physician dashboard.">
    <title>Stackly Clinic | Portal Login</title>
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-y: auto; position: relative; margin: 0; padding: 2rem 0;">

    <!-- ==========================================
       PRELOADER (HEARTBEAT PULSE)
       ========================================== -->
    <div class="preloader">
        <svg class="pulse-svg" viewBox="0 0 150 100">
            <path class="pulse-glow" d="M0,50 L40,50 L50,20 L60,80 L70,45 L75,55 L80,50 L120,50" />
            <path class="pulse-path" d="M0,50 L40,50 L50,20 L60,80 L70,45 L75,55 L80,50 L120,50" />
        </svg>
        <img src="images/logo.webp" alt="Stackly Logo" class="preloader-logo-img">
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-dot"></div>

    <!-- Back Buttons at top left -->
    <div class="auth-nav-buttons">
        <a href="index.html" class="auth-nav-btn"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="margin-right: 4px;"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Back to Home</a>
    </div>

    <!-- ==========================================
       LOGIN SEC CARD
       ========================================== -->
    <section class="auth-sec" style="display: flex; align-items: center; justify-content: center; width: 100%;">
        <div class="auth-card glass-card reveal reveal-scale" style="padding: 3rem; max-width: 480px; width: 90%; box-shadow: var(--shadow-lg);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="images/logo.webp" alt="Stackly Logo" style="height: 38px; width: auto; object-fit: contain; background-color: transparent; filter: brightness(0) invert(1); margin: 0 auto 1rem auto; display: block;">
                <h2 style="margin-top: 0; margin-bottom: 0.5rem; font-size: 2rem; font-weight: 800;">Welcome <span>Back</span></h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0;">Access your patient portal or healthcare dashboard.</p>
            </div>
            
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="form-control-wrap">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="login-email" placeholder="john@example.com" style="padding-left: 2.2rem;" required>
                    </div>
                    <span class="error-msg">Please enter a valid email.</span>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="form-control-wrap">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="login-password" placeholder="••••••••" style="padding-left: 2.2rem;" required>
                    </div>
                    <span class="error-msg">Please enter your password.</span>
                </div>
                
                <div class="form-group">
                    <label for="login-role">Select Portal Role</label>
                    <div class="form-control-wrap">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <select id="login-role" style="padding-left: 2.2rem;" required>
                            <option value="" disabled selected>Select Role</option>
                            <option value="patient">Patient Portal</option>
                            <option value="admin">Administrator Portal</option>
                        </select>
                    </div>
                    <span class="error-msg">Please select your portal role.</span>
                </div>
                
                <div class="auth-options">
                    <label class="checkbox-group">
                        <input type="checkbox" id="login-remember">
                        <span>Remember Me</span>
                    </label>
                    <a href="404.html">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 48px;">Access Portal</button>
            </form>
            
            <div class="auth-footer" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have a health account? <a href="register.html" style="color: var(--primary); font-weight: 700;">Register Here</a>
            </div>
        </div>
    </section>

    <!-- JavaScript Main logic -->
    <script src="js/main.js"></script>
</body>
</html>
