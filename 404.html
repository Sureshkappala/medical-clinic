<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stackly - Page Not Found.">
    <title>404 Page Not Found | Stackly Clinic</title>
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--bg-primary); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; margin: 0; padding: 0;">

    <!-- ==========================================
       PRELOADER (HEARTBEAT PULSE)
       ========================================== -->
    <div class="preloader">
        <svg class="pulse-svg" viewBox="0 0 150 100">
            <path class="pulse-glow" d="M0,50 L40,50 L50,20 L60,80 L70,45 L75,55 L80,50 L120,50" />
            <path class="pulse-path" d="M0,50 L40,50 L50,20 L60,80 L70,45 L75,55 L80,50 L120,50" />
        </svg>
        <img src="images/logo.webp" alt="Stackly Logo" class="preloader-logo-img">
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-dot"></div>

    <!-- Back Buttons at top left -->
    <div class="auth-nav-buttons">
        <a href="javascript:history.back()" class="auth-nav-btn"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Go Back</a>
        <a href="index.html" class="auth-nav-btn"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="margin-right: 4px;"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Back to Home</a>
    </div>

    <!-- 404 Main Card -->
    <div class="auth-card glass-card reveal reveal-scale" style="text-align: center; max-width: 480px; width: 90%; padding: 3rem;">
        <img src="images/404.webp" alt="404 Error" class="float-animation" style="width: 100%; max-width: 220px; margin: 0 auto 1.5rem auto; display: block;">
        <h2 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Oops! Page Not Found</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.6;">The medical file coordinates or patient panel page you requested does not point to any active clinic database records or server arrays. The page may have been relocated.</p>

        <div style="display: flex; gap: 1rem; width: 100%;">
            <a href="javascript:history.back()" class="btn btn-secondary" style="flex: 1; text-align: center; justify-content: center; height: 48px; display: flex; align-items: center;">Go Back</a>
            <a href="index.html" class="btn btn-primary" style="flex: 1; text-align: center; justify-content: center; height: 48px; display: flex; align-items: center;">Back To Home</a>
        </div>
    </div>

    <!-- JavaScript Main logic -->
    <script src="js/main.js"></script>
</body>
</html>
